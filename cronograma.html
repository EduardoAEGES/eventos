<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Actividades - EES CERTUS</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1e3a8a;
            --secondary: #10b981;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 2.5rem 2rem;
            color: white;
            text-align: center;
            border-bottom: 5px solid var(--secondary);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .header img {
            height: 55px;
            filter: brightness(0) invert(1);
            margin-bottom: 1rem;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* CONTAINER & FILTERS */
        .container {
            max-width: 900px;
            margin: 2.5rem auto;
            padding: 0 2rem;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: white;
            padding: 1.2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-group label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .filter-select {
            padding: 0.6rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.2s;
        }

        .filter-select:hover {
            border-color: var(--primary);
        }

        /* TIMELINE STYLES */
        .timeline-container {
            position: relative;
            padding: 20px 0;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #cbd5e1;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            padding-left: 55px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .timeline-dot {
            position: absolute;
            left: 12px;
            top: 25px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            z-index: 1;
        }

        .timeline-content {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px 25px;
            display: flex;
            gap: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .timeline-content:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.08);
            border-color: #cbd5e1;
        }

        .timeline-date-box {
            text-align: center;
            border-right: 2px solid #e2e8f0;
            padding-right: 20px;
            min-width: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .timeline-day-num {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-dark);
            line-height: 1;
        }

        .timeline-day-name {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary);
            margin-top: 6px;
        }

        .timeline-main-info {
            flex: 1;
        }

        .timeline-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .badge-public {
            background: #dcfce7;
            color: #166534;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-internal {
            background: #fef9c3;
            color: #854d0e;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .evento-tipo {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .timeline-main-info h4 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 12px 0;
            font-family: 'Outfit', sans-serif;
            line-height: 1.3;
        }

        .timeline-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timeline-detail-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
        }

        .timeline-detail-tag i {
            color: var(--primary);
            font-size: 15px;
        }

        /* EMPTY STATE / LOADING */
        .status-box {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            background: white;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }

        .status-box i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #94a3b8;
        }

        .status-box p {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* FOOTER */
        .footer {
            background: white;
            padding: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <header class="header">
        <img src="LOGO_CERTUS_SUNAT.png" alt="Certus Logo">
        <h1>CRONOGRAMA DE ACTIVIDADES</h1>
        <p>Eventos CONTA - PLN 2026</p>
    </header>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <i class="ph-fill ph-calendar-blank" style="font-size: 1.5rem; color: var(--primary);"></i>
                <select id="month-filter" class="filter-select">
                    <option value="all">Cargando meses...</option>
                </select>
            </div>
            <div class="control-group">
                <i class="ph-fill ph-eye" style="font-size: 1.5rem; color: var(--text-muted);"></i>
                <select id="visibility-filter" class="filter-select">
                    <option value="all">Todos los Eventos</option>
                    <option value="publico">Solo Públicos</option>
                    <option value="privado">Solo Internos/Privados</option>
                </select>
            </div>
        </div>

        <div id="timeline-container" class="timeline-container">
            <div class="status-box">
                <i class="ph ph-spinner ph-spin"></i>
                <p>Cargando cronograma en vivo...</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        © 2026 Escuela de Educación Superior CERTUS. Todos los derechos reservados.
    </footer>

    <script>
        // Inicializar Supabase
        const supabaseUrl = 'https://klmjmlhwuzhymrplemgw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsbWptbGh3dXpoeW1ycGxlbWd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1OTMyNjQsImV4cCI6MjA4NzE2OTI2NH0.xFWMvUJa9n9TBcBG1WSeqCGiWBaCAtCU9aY7GXk4W6E';
        // Renombramos para evitar conflicto con window.supabase
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let allEvents = [];
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        // Helper para parsear fecha de forma robusta
        function getSafeDate(ev) {
            let dateStr = ev.fecha_inicio;
            
            // Si no hay fecha_inicio, intentar sacarla del horario
            if (!dateStr && ev.horario) {
                try {
                    let hs = ev.horario;
                    if (typeof hs === 'string') hs = JSON.parse(hs);
                    if (Array.isArray(hs) && hs.length > 0 && hs[0].fecha) {
                        dateStr = hs[0].fecha;
                    }
                } catch(e) { console.warn("Error parsing horario for date", e); }
            }
            
            // Si sigue sin haber, usar created_at
            if (!dateStr) dateStr = ev.created_at;
            
            if (!dateStr) return new Date();

            // Manejar formato YYYY-MM-DD o ISO
            if (typeof dateStr === 'string') {
                const cleanDate = dateStr.split('T')[0];
                const parts = cleanDate.split('-');
                if (parts.length === 3) {
                    // Meses en JS son 0-indexed
                    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                    if (!isNaN(d.getTime())) return d;
                }
            }
            
            const finalDate = new Date(dateStr);
            return isNaN(finalDate.getTime()) ? new Date() : finalDate;
        }

        function getStartTime(ev) {
            try {
                let hs = ev.horario;
                if (typeof hs === 'string') hs = JSON.parse(hs || '[]');
                if (Array.isArray(hs) && hs.length > 0 && hs[0].inicio) return hs[0].inicio;
            } catch(e) {}
            return '00:00';
        }

        function getEventScheduleSummary(ev) {
            try {
                let hs = ev.horario;
                if (typeof hs === 'string') hs = JSON.parse(hs || '[]');
                if (!Array.isArray(hs) || hs.length === 0) return { dayNums: '?', dayNames: '?', times: '00:00 - 00:00' };

                const dateObjects = hs.map(h => {
                    if (!h.fecha) return new Date();
                    const parts = h.fecha.split('-');
                    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                });

                const dayNums = dateObjects.map(d => d.getDate());
                const dayNames = dateObjects.map(d => d.toLocaleDateString('es-ES', { weekday: 'short' }).toUpperCase().replace('.', ''));

                const times = hs.map(h => `${h.inicio} - ${h.fin}`);
                const uniqueTimes = [...new Set(times)];

                let dayNumsStr = "";
                if (dayNums.length > 1) {
                    const isContiguous = dayNums.every((num, i) => i === 0 || num === dayNums[i-1] + 1);
                    if (isContiguous) {
                        dayNumsStr = `${dayNums[0]} - ${dayNums[dayNums.length - 1]}`;
                    } else {
                        dayNumsStr = dayNums.join(', ');
                    }
                } else {
                    dayNumsStr = dayNums[0];
                }

                return { 
                    dayNums: dayNumsStr, 
                    dayNames: [...new Set(dayNames)].join(' '), 
                    times: uniqueTimes.join(' | ') 
                };
            } catch (e) {
                return { dayNums: '?', dayNames: '?', times: '00:00 - 00:00' };
            }
        }

        async function fetchEvents() {
            try {
                const timelineContainer = document.getElementById('timeline-container');
                console.log("Iniciando fetch de tabla 'eventos'...");
                
                const { data, error } = await supabaseClient
                    .from('eventos') // Tabla correcta segun screenshot
                    .select('*')
                    .eq('is_public', true)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                allEvents = (data || []).filter(ev => {
                    const estado = (ev.estado_especial || '').toLowerCase();
                    const status = ev.status;
                    const isCancelled = estado === 'cancelado' || estado === 'suspendido';
                    return status !== 6 && !isCancelled && estado !== 'postergado';
                });

                console.log("Eventos cargados:", allEvents.length);
                
                populateMonthFilter();
                renderTimeline();

            } catch (error) {
                console.error('Error fetching events:', error);
                document.getElementById('timeline-container').innerHTML = `
                    <div class="status-box" style="color: #ef4444; border-color: #fca5a5; background: #fef2f2;">
                        <i class="ph ph-warning-circle" style="color: #ef4444;"></i>
                        <p>Error: ${error.message || 'No se pudo conectar con la base de datos'}.</p>
                    </div>`;
            }
        }

        function populateMonthFilter() {
            const filter = document.getElementById('month-filter');
            if (allEvents.length === 0) {
                filter.innerHTML = '<option value="all">Sin eventos programados</option>';
                return;
            }

            const months = [...new Set(allEvents.map(ev => {
                const date = getSafeDate(ev);
                return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            }))].sort().reverse();

            filter.innerHTML = '<option value="all">Todos los meses</option>' + months.map(m => {
                const [y, mm] = m.split('-');
                return `<option value="${m}">${monthNames[parseInt(mm)-1]} ${y}</option>`;
            }).join('');
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            const monthVal = document.getElementById('month-filter').value;
            const visVal = document.getElementById('visibility-filter').value;

            const filtered = allEvents.filter(ev => {
                const date = getSafeDate(ev);
                const evMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                
                const matchMonth = monthVal === 'all' || evMonth === monthVal;
                const matchVis = visVal === 'all' || (visVal === 'publico' ? ev.is_public : !ev.is_public);
                
                return matchMonth && matchVis;
            });

            // Ordenar por fecha cronológica (más cercanos primero) y luego por hora
            filtered.sort((a, b) => {
                const dateA = getSafeDate(a);
                const dateB = getSafeDate(b);
                
                if (dateA.getTime() !== dateB.getTime()) {
                    return dateA - dateB;
                }
                
                // Si son el mismo día, ordenar por hora de inicio (ej: 10:00 antes que 11:00)
                return getStartTime(a).localeCompare(getStartTime(b));
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="status-box">
                        <i class="ph ph-calendar-x"></i>
                        <p>No hay eventos públicos programados para esta selección.</p>
                    </div>`;
                return;
            }

            let currentMonthGroup = '';
            let html = '';

            filtered.forEach((ev, index) => {
                const date = getSafeDate(ev);
                const evMonthStr = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
                
                if (monthVal === 'all' && currentMonthGroup !== evMonthStr) {
                    currentMonthGroup = evMonthStr;
                    html += `<div style="margin: 30px 0 15px 40px; font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--primary-dark); padding-bottom: 5px; border-bottom: 2px solid #e2e8f0; display: inline-block;">${currentMonthGroup}</div>`;
                }

                const summary = getEventScheduleSummary(ev);
                const dayNum = summary.dayNums;
                const dayName = summary.dayNames;
                const timeStr = summary.times;
                const badgeClass = ev.is_public ? 'badge-public' : 'badge-internal';
                const badgeText = ev.is_public ? 'Público' : 'Interno';

                let ponente = ev.ponente || 'Por asignar';
                if(ponente !== 'Por asignar' && ponente.toLowerCase() !== 'pendiente') {
                     ponente = ponente.replace(' (CERTUS)', '');
                     if(ponente.includes(',')) {
                         const parts = ponente.split(',');
                         ponente = (parts[1].trim() + ' ' + parts[0].trim()).trim();
                     }
                }

                html += `
                    <div class="timeline-item" style="animation-delay: ${index * 0.05}s">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="timeline-date-box">
                                <div class="timeline-day-num">${dayNum}</div>
                                <div class="timeline-day-name">${dayName}</div>
                            </div>
                            <div class="timeline-main-info">
                                <div class="timeline-header-row">
                                    <span class="${badgeClass}">${badgeText}</span>
                                    <span class="evento-tipo">${ev.tipo || 'Evento'}</span>
                                </div>
                                <h4 style="margin: 0.5rem 0;">${ev.nombre}</h4>
                                <div class="timeline-details">
                                    <div class="timeline-detail-tag"><i class="ph-fill ph-clock"></i> ${timeStr}</div>
                                    <div class="timeline-detail-tag"><i class="ph-fill ph-broadcast"></i> ${ev.modalidad || 'Virtual'}</div>
                                    <div class="timeline-detail-tag"><i class="ph-fill ph-map-pin"></i> ${ev.sedes || 'Sede no especificada'}</div>
                                    <div class="timeline-detail-tag"><i class="ph-fill ph-user"></i> ${ponente}</div>
                                    <div class="timeline-detail-tag" title="Público Objetivo"><i class="ph-fill ph-users-three"></i> ${ev.audiencia || 'Público General'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Listeners
        document.getElementById('month-filter').addEventListener('change', renderTimeline);
        document.getElementById('visibility-filter').addEventListener('change', renderTimeline);

        // Fetch Data on Load
        fetchEvents();

    </script>
</body>
</html>
